; PlatformIO — Waveshare ESP32-S3-LCD-1.3: pharmacy parody label + on-device char transformer (shake to regenerate).

[platformio]
default_envs = esp32-s3-lcd-1-3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_ldf_mode = chain

[env:esp32-s3-lcd-1-3]
board = esp32-s3-devkitm-1
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = partitions_16MB_littlefs.csv
board_build.arduino.memory_type = qio_opi
build_src_filter =
    +<main.cpp>
    +<transformer_infer.cpp>
build_unflags = -Os
build_flags =
    -DBOARD_HAS_PSRAM
    -O3
    -ffast-math
    -fno-finite-math-only
    -DUSER_SETUP_LOADED
    -include include/waveshare_tft_eSPI_setup.h
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lewisxhe/SensorLib @ ^0.4.1
